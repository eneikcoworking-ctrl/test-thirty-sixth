openapi: 3.0.3
info:
  title: LeadGen Bot - Campaign Management API Contract
  description: |
    API Contract for the Campaign Management module of the LeadGen Bot platform.
    Defines endpoints for campaign operations, spintax template configurations, and lead list CSV ingestion.
  version: 1.0.0
servers:
  - url: /api
    description: Local development / relative path
paths:
  /campaigns:
    get:
      summary: List all campaigns
      description: Retrieves a list of all active or drafted campaigns.
      operationId: listCampaigns
      responses:
        '200':
          description: A list of campaigns successfully retrieved.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Campaign'
    post:
      summary: Create a new campaign
      description: Creates a campaign with the given details.
      operationId: createCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreate'
      responses:
        '201':
          description: Campaign successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          description: Invalid input parameters.

  /campaigns/{id}:
    get:
      summary: Get campaign by ID
      description: Retrieves details of a single campaign.
      operationId: getCampaignById
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the campaign to retrieve.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Campaign found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '404':
          description: Campaign not found.

  /campaigns/{campaignId}/spintax:
    get:
      summary: Get spintax configuration
      description: Retrieves the current active spintax template config for the campaign.
      operationId: getSpintaxConfig
      parameters:
        - name: campaignId
          in: path
          required: true
          description: ID of the campaign.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Spintax configuration successfully retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpintaxConfig'
        '404':
          description: Campaign or Spintax configuration not found.

    put:
      summary: Set/Update spintax configuration
      description: Saves or updates the spintax template configuration for a campaign. Supports spintax syntax (e.g. `{Hi|Hello} lead!`).
      operationId: updateSpintaxConfig
      parameters:
        - name: campaignId
          in: path
          required: true
          description: ID of the campaign.
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpintaxConfigUpdate'
      responses:
        '200':
          description: Spintax configuration successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpintaxConfig'
        '400':
          description: Invalid spintax syntax or empty template text.
        '404':
          description: Campaign not found.

  /campaigns/{campaignId}/leads/upload:
    post:
      summary: Upload lead list from CSV
      description: |
        Ingests a lead target list from a `.csv` or `.txt` file.
        Each lead should specify either a `@username` or a `phone_number`.
        If there are any validation errors (e.g., malformed phone numbers, missing identifiers, or empty fields), the endpoint returns a 422 Unprocessable Entity status containing a detailed list of batch parsing validation errors specifying row number, field name, error reason, and the original invalid value.
      operationId: uploadLeadsCsv
      parameters:
        - name: campaignId
          in: path
          required: true
          description: ID of the campaign to assign the uploaded leads.
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file to upload containing leads.
      responses:
        '200':
          description: CSV parsed successfully and leads imported.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadUploadResponse'
        '400':
          description: Missing file or completely invalid file format.
        '404':
          description: Campaign not found.
        '422':
          description: Batch parsing validation errors encountered in the uploaded CSV.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchValidationError'

components:
  schemas:
    Campaign:
      type: object
      required:
        - id
        - name
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Summer Promo"
        status:
          type: string
          enum: [DRAFT, ACTIVE, PAUSED, ARCHIVED]
          example: "ACTIVE"
        createdAt:
          type: string
          format: date-time
          example: "2026-07-23T18:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-07-23T18:00:00Z"

    CampaignCreate:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          example: "Summer Promo"
        status:
          type: string
          enum: [DRAFT, ACTIVE, PAUSED, ARCHIVED]
          example: "DRAFT"

    SpintaxConfig:
      type: object
      required:
        - id
        - campaignId
        - templateText
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          example: 12
        campaignId:
          type: integer
          format: int64
          example: 1
        templateText:
          type: string
          example: "{Hi|Hello|Hey} check our new promo at {link|url}!"
        createdAt:
          type: string
          format: date-time
          example: "2026-07-23T18:15:00Z"

    SpintaxConfigUpdate:
      type: object
      required:
        - templateText
      properties:
        templateText:
          type: string
          example: "{Hi|Hello|Hey} check our new promo at {link|url}!"

    LeadUploadResponse:
      type: object
      required:
        - success
        - importedCount
        - message
      properties:
        success:
          type: boolean
          example: true
        importedCount:
          type: integer
          example: 154
        message:
          type: string
          example: "Successfully parsed CSV and imported 154 leads."

    BatchValidationError:
      type: object
      required:
        - success
        - message
        - errors
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "CSV parsing failed with 3 validation errors."
        errors:
          type: array
          items:
            $ref: '#/components/schemas/RowValidationError'

    RowValidationError:
      type: object
      required:
        - row
        - field
        - error
        - originalValue
      properties:
        row:
          type: integer
          description: The 1-based index of the row in the CSV file.
          example: 4
        field:
          type: string
          description: The specific CSV column name (e.g. username, phone_number) where validation failed.
          example: "phone_number"
        error:
          type: string
          description: The validation error description.
          example: "Invalid phone number format, must start with '+' followed by digits."
        originalValue:
          type: string
          description: The original raw cell/row value that caused the validation failure.
          example: "123456abcd"
